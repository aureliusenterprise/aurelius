name: CI

on:
    push:
        branches:
            - main

    pull_request:
        branches:
            - main

jobs:
    validate:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup toolchain
              uses: ./.github/actions/setup-toolchain
              with:
                  node: 'true'
                  python: 'true'

            - name: Run pre-commit hooks
              uses: pre-commit/action@v3.0.1

    test:
        runs-on: ubuntu-latest
        needs: validate

        permissions:
            actions: read
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup toolchain
              uses: ./.github/actions/setup-toolchain
              with:
                  cleanup: 'true'
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  node: 'true'
                  python: 'true'
                  sops: 'true'

            - name: Set SHA for affected command
              uses: nrwl/nx-set-shas@v5

            - name: Create docker-compose v1→v2 compatibility wrapper
              shell: bash
              run: |
                  # testcontainers <4.0.0 calls the legacy 'docker-compose' binary,
                  # but modern Docker ships only 'docker compose' (v2 plugin).
                  # This wrapper forwards all arguments transparently.
                  cat > /usr/local/bin/docker-compose << 'EOF'
                  #!/usr/bin/env bash
                  exec docker compose "$@"
                  EOF
                  chmod +x /usr/local/bin/docker-compose

            - name: Test affected projects
              env:
                  SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
              run: npx nx affected -t test e2e -c ci

            - name: Upload coverage reports
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-reports
                  path: |
                      **/coverage.xml
                      **/lcov.info
                  if-no-files-found: ignore

    build-and-scan:
        runs-on: ubuntu-latest
        needs: validate

        permissions:
            actions: read
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup toolchain
              uses: ./.github/actions/setup-toolchain
              with:
                  cleanup: 'true'
                  cosign: 'true'
                  cyclonedx: 'true'
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  node: 'true'
                  python: 'true'
                  trivy: 'true'

            - name: Set SHA for affected commands
              uses: nrwl/nx-set-shas@v5

            - name: Build docker images for affected projects
              run: npx nx affected -t docker-build -c ci

            - name: Generate vulnerability reports for affected projects
              run: npx nx affected -t docker-vuln-scan -c sarif

            - name: Upload vulnerability reports
              uses: actions/upload-artifact@v7
              with:
                  name: vuln-reports
                  path: '**/vulnerabilities.sarif'
                  if-no-files-found: ignore

    sonar:
        runs-on: ubuntu-latest
        needs: [test, build-and-scan]

        permissions:
            actions: read
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup toolchain
              uses: ./.github/actions/setup-toolchain
              with:
                  cleanup: 'true'
                  node: 'true'
                  sonar: 'true'
                  sops: 'true'

            - name: Download coverage reports
              continue-on-error: true
              uses: actions/download-artifact@v8
              with:
                  name: coverage-reports

            - name: Download vulnerability reports
              continue-on-error: true
              uses: actions/download-artifact@v8
              with:
                  name: vuln-reports

            - name: Set SHA for affected commands
              uses: nrwl/nx-set-shas@v5

            - name: Decrypt secrets for SonarQube
              env:
                  SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
              run: npx nx affected -t decrypt

            - name: Run SonarQube analysis
              env:
                  SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
              run: npx nx affected -t sonar
