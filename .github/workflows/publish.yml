name: Publish Containers

on:
    push:
        tags:
            - v*.*.*

jobs:
    test:
        name: Publish
        runs-on: ubuntu-latest-4-cores
        permissions: write-all
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Install dependencies
              run: npm install
              shell: bash

            - name: Print Environment Info
              run: npx nx report
              shell: bash

            - name: Setup Python, Poetry and Dependencies
              uses: packetcoders/action-setup-cache-python-poetry@main
              with:
                  python-version: 3.8
                  poetry-version: 1.8.4

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish containers
              run: npx nx run-many -t docker-publish -- --namespace ghcr.io/aureliusenterprise --version ${{ github.ref_name }}
              shell: bash

            - name: Install Cosign
              uses: sigstore/cosign-installer@v4.1.1

            - name: Publish containers
              run: npx nx run-many -t docker-publish -- --version ${{ github.ref_name }}

            - name: Sign containers
              run: npx nx run-many -t docker-sign -- --version ${{ github.ref_name }}

            - name: Verify container signatures
              run: >
                  npx nx run-many -t docker-verify -- --version ${{ github.ref_name }}
                  --identity "^https://github\.com/${{ github.repository_owner }}/aurelius/\.github/workflows/publish\.yml@${{ github.ref }}$"
                  --issuer "^https://token\.actions\.githubusercontent\.com$"

            - name: Publish helm chart
              run: npx nx run-many -t helm-publish -- --namespace ghcr.io/aureliusenterprise --version ${{ github.ref_name }}
              shell: bash
