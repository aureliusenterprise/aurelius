name: m4i-publish-state

services:
    jobmanager:
        image: m4i-publish-state:local
        command: standalone-job -pym m4i_publish_state
        configs:
            - source: certs
              target: /opt/flink/certs
              uid: '0'
              gid: '0'
              mode: 640
        env_file: .env
        environment:
            _python_worker_execution_mode: process
            FLINK_PROPERTIES: |
                blob.server.port: ${FLINK_JOB_MANAGER_BLOB_SERVER_PORT}
                jobmanager.rpc.address: m4i-publish-state-jobmanager
                jobmanager.rpc.port: ${FLINK_JOB_MANAGER_RPC_PORT}
                rest.address: m4i-publish-state-jobmanager
                rest.port: ${FLINK_JOB_MANAGER_REST_PORT}
                blob.server.port: ${FLINK_JOB_MANAGER_BLOB_SERVER_PORT}
        extra_hosts:
            - keycloak.localhost:host-gateway
        hostname: m4i-publish-state-jobmanager
        networks:
            - aurelius-atlas-dev-network
        ports:
            - ${FLINK_JOB_MANAGER_REST_PORT}:${FLINK_JOB_MANAGER_REST_PORT}
            - ${FLINK_JOB_MANAGER_RPC_PORT}
            - ${FLINK_JOB_MANAGER_BLOB_SERVER_PORT}
        volumes:
            - checkpoints:/tmp/flink-checkpoints-directory

    taskmanager:
        image: m4i-publish-state:local
        command: taskmanager
        configs:
            - source: certs
              target: /opt/flink/certs
              uid: '0'
              gid: '0'
              mode: 640
        depends_on:
            - jobmanager
        env_file: .env
        environment:
            _python_worker_execution_mode: process
            FLINK_PROPERTIES: |
                blob.server.port: ${FLINK_JOB_MANAGER_BLOB_SERVER_PORT}
                jobmanager.rpc.address: m4i-publish-state-jobmanager
                jobmanager.rpc.port: ${FLINK_JOB_MANAGER_RPC_PORT}
                rest.address: m4i-publish-state-jobmanager
                rest.port: ${FLINK_JOB_MANAGER_REST_PORT}
        extra_hosts:
            - keycloak.localhost:host-gateway
        hostname: m4i-publish-state-taskmanager
        networks:
            - aurelius-atlas-dev-network
        volumes:
            - checkpoints:/tmp/flink-checkpoints-directory

configs:
    certs:
        file: ../../dev/certs

networks:
    aurelius-atlas-dev-network:
        external: true

volumes:
    checkpoints:
