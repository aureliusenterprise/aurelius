name: m4i-update-gov-data-quality

services:
    jobmanager:
        image: m4i-update-gov-data-quality:local
        command: standalone-job -pym m4i_update_gov_data_quality
        configs:
            - source: certs
              target: /opt/flink/certs
              uid: '0'
              gid: '0'
              mode: 0640
        env_file: .env
        environment:
            FLINK_PROPERTIES: |
                jobmanager.rpc.address: m4i-update-gov-data-quality-jobmanager
                jobmanager.rpc.port: ${FLINK_JOB_MANAGER_RPC_PORT}
                rest.address: m4i-update-gov-data-quality-jobmanager
                rest.port: ${FLINK_JOB_MANAGER_REST_PORT}
        extra_hosts:
            - keycloak.localhost:host-gateway
        hostname: m4i-update-gov-data-quality-jobmanager
        networks:
            - aurelius-atlas-dev-network
        ports:
            - ${FLINK_JOB_MANAGER_REST_PORT}:${FLINK_JOB_MANAGER_REST_PORT}
            - ${FLINK_JOB_MANAGER_RPC_PORT}
        volumes:
            - checkpoints:/tmp/flink-checkpoints-directory

    taskmanager:
        image: m4i-update-gov-data-quality:local
        command: taskmanager
        configs:
            - source: certs
              target: /opt/flink/certs
              uid: '0'
              gid: '0'
              mode: 0640
        depends_on:
            - jobmanager
        env_file: .env
        environment:
            FLINK_PROPERTIES: |
                jobmanager.rpc.address: m4i-update-gov-data-quality-jobmanager
                jobmanager.rpc.port: ${FLINK_JOB_MANAGER_RPC_PORT}
                rest.address: m4i-update-gov-data-quality-jobmanager
                rest.port: ${FLINK_JOB_MANAGER_REST_PORT}
        extra_hosts:
            - keycloak.localhost:host-gateway
        hostname: m4i-update-gov-data-quality-taskmanager
        networks:
            - aurelius-atlas-dev-network
        volumes:
            - checkpoints:/tmp/flink-checkpoints-directory

configs:
    certs:
        file: ../../dev/certs

networks:
    aurelius-atlas-dev-network:
        external: true

volumes:
    checkpoints:
