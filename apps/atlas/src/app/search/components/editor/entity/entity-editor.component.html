<ng-container [formGroup]="editorFormService.form" *ngIf="validationResults$ | async as rules">
    <div class="field">
        <label class="label" translate> search.components.editor.entity.name </label>
        <div class="grid">
            <div class="control">
                <input
                    id="name"
                    name="name"
                    class="input"
                    type="text"
                    placeholder="{{ 'search.components.editor.entity.namePlaceholder' | translate }}"
                    [formControl]="name"
                    required
                    [class.is-danger]="(editorFormService.submitted | async) && name.invalid"
                />
            </div>
            <ng-container *ngIf="rules.name as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
        <ng-container *ngIf="(editorFormService.submitted | async) && name.invalid">
            <p *ngIf="name.errors?.required" class="help is-danger" translate>
                search.components.editor.entity.nameRequired
            </p>
        </ng-container>
        <ng-container *ngIf="name.value && name.value.includes('\u2019')">
            <p class="help is-warning" translate>search.components.editor.entity.nameWarning</p>
        </ng-container>
    </div>

    <div *ngIf="false" class="field">
        <label class="label" translate> search.components.editor.entity.typeAlias </label>
        <div class="grid">
            <div class="control">
                <input
                    id="typeAlias"
                    name="typeAlias"
                    class="input"
                    type="text"
                    placeholder="{{ 'search.components.editor.entity.typeAliasPlaceholder' | translate }}"
                    [formControl]="typeAlias"
                    [class.is-danger]="(editorFormService.submitted | async) && typeAlias.invalid"
                />
            </div>
            <ng-container *ngIf="rules.typeAlias as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.entity.definition </label>
        <div class="grid">
            <div class="control">
                <textarea
                    class="textarea"
                    placeholder="{{ 'search.components.editor.entity.definitionPlaceholder' | translate }}"
                    [formControl]="definition"
                    [class.is-warning]="rules?.definition?.isNonCompliant"
                ></textarea>
            </div>
            <ng-container *ngIf="rules.definition as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
        <ng-container *ngIf="definition.value && definition.value.includes('\u2019')">
            <p class="help is-warning" translate>search.components.editor.entity.definitionWarning</p>
        </ng-container>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.entity.classifications </label>
        <div class="grid">
            <div class="control">
                <models4insight-classifications-input [tags]="classifications"></models4insight-classifications-input>
            </div>
        </div>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.entity.dataDomain </label>
        <div class="grid">
            <div class="control">
                <models4insight-relationships-input
                    [tags]="dataDomains"
                    typeName="m4i_data_domain"
                    [rule]="rules?.dataDomain"
                    [singleRelationship]="true"
                ></models4insight-relationships-input>
            </div>
            <ng-container *ngIf="rules.dataDomain as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.entity.parentEntity </label>
        <div class="grid">
            <div class="control">
                <models4insight-relationships-input
                    [tags]="parentEntities"
                    typeName="m4i_data_entity"
                    [rule]="rules.parentEntity"
                    [singleRelationship]="true"
                ></models4insight-relationships-input>
            </div>
            <ng-container *ngIf="rules.parentEntity as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.entity.childEntities </label>
        <div class="grid">
            <div class="control">
                <models4insight-relationships-input
                    [tags]="childEntities"
                    typeName="m4i_data_entity"
                    [rule]="rules.childEntity"
                ></models4insight-relationships-input>
            </div>
            <ng-container *ngIf="rules.childEntity as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.entity.dataAttributes </label>
        <div class="grid">
            <div class="control">
                <models4insight-relationships-input
                    [tags]="dataAttributes"
                    typeName="m4i_data_attribute"
                    [rule]="rules.attributes"
                ></models4insight-relationships-input>
            </div>
            <ng-container *ngIf="rules.attributes as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.entity.dataOwners </label>
        <div class="grid">
            <div class="control">
                <models4insight-relationships-input
                    [tags]="dataOwners"
                    typeName="m4i_person"
                    [rule]="rules?.businessOwner"
                ></models4insight-relationships-input>
            </div>
            <ng-container *ngIf="rules.businessOwner as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.entity.dataStewards </label>
        <div class="grid">
            <div class="control">
                <models4insight-relationships-input
                    [tags]="dataStewards"
                    typeName="m4i_person"
                    [rule]="rules?.steward"
                ></models4insight-relationships-input>
            </div>
            <ng-container *ngIf="rules.steward as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>
    <div class="field">
        <div class="grid">
            <ng-container *ngIf="(editorFormService.submitted | async) && editorFormService.form.invalid">
                <div class="notification is-danger is-light mb-4">
                    <p><strong translate> search.components.editor.entity.notification </strong></p>
                </div>
            </ng-container>
        </div>
    </div>
</ng-container>
