<ng-container [formGroup]="editorFormService.form" *ngIf="validationResults$ | async as rules">
    <div class="field">
        <label class="label" translate> search.components.editor.process.name </label>
        <div class="grid">
            <div class="control">
                <input
                    id="name"
                    name="name"
                    class="input"
                    type="text"
                    placeholder="{{ 'search.components.editor.process.namePlaceholder' | translate }}"
                    [formControl]="name"
                    required
                    [class.is-danger]="(editorFormService.submitted | async) && name.invalid"
                />
            </div>
            <ng-container *ngIf="rules.name as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
        <ng-container *ngIf="(editorFormService.submitted | async) && name.invalid">
            <p *ngIf="name.errors?.required" class="help is-danger" translate>
                search.components.editor.process.nameRequired
            </p>
        </ng-container>
        <ng-container *ngIf="name.value && name.value.includes('\u2019')">
            <p class="help is-warning" translate>search.components.editor.process.nameWarning</p>
        </ng-container>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.process.definition </label>
        <div class="grid">
            <div class="control">
                <textarea
                    class="textarea"
                    placeholder="{{ 'search.components.editor.process.definitionPlaceholder' | translate }}"
                    [formControl]="definition"
                    [class.is-warning]="rules?.definition?.isNonCompliant"
                ></textarea>
            </div>
            <ng-container *ngIf="rules.definition as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
        <ng-container *ngIf="definition.value && definition.value.includes('\u2019')">
            <p class="help is-warning" translate>search.components.editor.process.definitionWarning</p>
        </ng-container>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.process.system </label>
        <div class="grid">
            <div class="control">
                <models4insight-relationships-input
                    [tags]="systems"
                    typeName="m4i_system"
                    [rule]="rules.system"
                    [singleRelationship]="true"
                ></models4insight-relationships-input>
            </div>
            <ng-container *ngIf="rules.system as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.process.inputs </label>
        <div class="grid">
            <div class="control">
                <models4insight-relationships-input
                    [tags]="inputs"
                    typeName="m4i_dataset"
                    [rule]="rules.inputs"
                ></models4insight-relationships-input>
            </div>
            <ng-container *ngIf="rules.inputs as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.process.outputs </label>
        <div class="grid">
            <div class="control">
                <models4insight-relationships-input
                    [tags]="outputs"
                    typeName="m4i_dataset"
                    [rule]="rules.outputs"
                ></models4insight-relationships-input>
            </div>
            <ng-container *ngIf="rules.outputs as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>
    <div class="field">
        <div class="grid">
            <ng-container *ngIf="(editorFormService.submitted | async) && editorFormService.form.invalid">
                <div class="notification is-danger is-light mb-4">
                    <p><strong translate> search.components.editor.process.notification </strong></p>
                </div>
            </ng-container>
        </div>
    </div>
</ng-container>
