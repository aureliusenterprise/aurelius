<ng-container [formGroup]="editorFormService.form" *ngIf="validationResults$ | async as rules">
    <div class="field">
        <label class="label" translate> search.components.editor.system.name </label>
        <div class="grid">
            <div class="control">
                <input
                    id="name"
                    name="name"
                    class="input"
                    type="text"
                    placeholder="{{ 'search.components.editor.system.namePlaceholder' | translate }}"
                    [formControl]="name"
                    required
                    [class.is-danger]="(editorFormService.submitted | async) && name.invalid"
                />
            </div>
            <ng-container *ngIf="rules.name as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
        <ng-container *ngIf="(editorFormService.submitted | async) && name.invalid">
            <p *ngIf="name.errors?.required" class="help is-danger" translate>
                search.components.editor.system.nameRequired
            </p>
        </ng-container>
        <ng-container *ngIf="name.value && name.value.includes('\u2019')">
            <p class="help is-warning" translate>search.components.editor.system.nameWarning</p>
        </ng-container>
    </div>

    <div *ngIf="false" class="field">
        <label class="label" translate> search.components.editor.system.typeAlias </label>
        <div class="grid">
            <div class="control">
                <input
                    id="typeAlias"
                    name="typeAlias"
                    class="input"
                    type="text"
                    placeholder="{{ 'search.components.editor.system.typeAliasPlaceholder' | translate }}"
                    [formControl]="typeAlias"
                    [class.is-danger]="(editorFormService.submitted | async) && typeAlias.invalid"
                />
            </div>
            <ng-container *ngIf="rules.typeAlias as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.system.definition </label>
        <div class="grid">
            <div class="control">
                <textarea
                    class="textarea"
                    placeholder="{{ 'search.components.editor.system.definitionPlaceholder' | translate }}"
                    [formControl]="definition"
                ></textarea>
            </div>
            <ng-container *ngIf="rules.definition as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
        <ng-container *ngIf="definition.value && definition.value.includes('\u2019')">
            <p class="help is-warning" translate>search.components.editor.system.definitionWarning</p>
        </ng-container>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.system.parentSystem </label>
        <div class="grid">
            <div class="control">
                <models4insight-relationships-input
                    [tags]="parentSystems"
                    typeName="m4i_system"
                    [rule]="rules.parentSystem"
                    [singleRelationship]="true"
                ></models4insight-relationships-input>
            </div>
            <ng-container *ngIf="rules.parentSystem as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.system.subsystems </label>
        <div class="grid">
            <div class="control">
                <models4insight-relationships-input
                    [tags]="childSystems"
                    typeName="m4i_system"
                    [rule]="rules.childSystem"
                ></models4insight-relationships-input>
            </div>
            <ng-container *ngIf="rules.childSystem as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>

    <div class="field">
        <label class="label" translate> search.components.editor.system.collections </label>
        <div class="grid">
            <div class="control">
                <models4insight-relationships-input
                    [tags]="collections"
                    typeName="m4i_collection"
                    [rule]="rules?.collections"
                ></models4insight-relationships-input>
            </div>
            <ng-container *ngIf="rules.collections as rules">
                <models4insight-gov-quality-display
                    [rules]="rules"
                    class="is-size-7"
                ></models4insight-gov-quality-display
            ></ng-container>
        </div>
    </div>
    <div class="field">
        <div class="grid">
            <ng-container *ngIf="(editorFormService.submitted | async) && editorFormService.form.invalid">
                <div class="notification is-danger is-light mb-4">
                    <p><strong translate> search.components.editor.system.notification </strong></p>
                </div>
            </ng-container>
        </div>
    </div>
</ng-container>
