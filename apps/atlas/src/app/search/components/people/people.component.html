<ng-container *ngIf="showPlaceholder">
    <p *ngIf="noPeople$ | async" class="is-italic has-text-centered" translate>search.components.people.empty</p>
</ng-container>
<ng-container *ngIf="details$ | async as details" class="container">
    <ng-container *ngIf="deduplicate(details.entity.relationshipAttributes?.domainLead) as domainLeads">
        <div *ngIf="domainLeads.length > 0">
            <span class="icon is-small">
                <fa-icon class="business" [icon]="personsIcon"> </fa-icon>
            </span>
            <span translate> search.components.people.domainLead </span>
            <ng-container *ngFor="let domainLead of domainLeads; let last = last">
                <span class="pointer" (click)="directToDetailsPage(domainLead.guid)">
                    <a>{{ domainLead.displayText }}</a>
                </span>
                <span *ngIf="!last">, </span>
            </ng-container>
        </div>
    </ng-container>
    <ng-container *ngIf="deduplicate(details.entity.relationshipAttributes?.businessOwner) as owners">
        <div *ngIf="owners.length > 0">
            <span class="icon is-small">
                <fa-icon class="business" [icon]="personsIcon"> </fa-icon>
            </span>
            <span translate> search.components.people.dataOwner </span>
            <ng-container *ngFor="let owner of owners; let last = last">
                <span class="pointer" (click)="directToDetailsPage(owner.guid)">
                    <a>{{ owner.displayText }}</a>
                </span>
                <span *ngIf="!last">, </span>
            </ng-container>
        </div>
    </ng-container>
    <ng-container *ngIf="deduplicate(details.entity.relationshipAttributes?.steward) as stewards">
        <div *ngIf="stewards.length > 0">
            <span class="icon is-small">
                <fa-icon class="business" [icon]="personsIcon"> </fa-icon>
            </span>
            <span translate> search.components.people.dataSteward </span>
            <ng-container *ngFor="let steward of stewards; let last = last">
                <span class="pointer" (click)="directToDetailsPage(steward.guid)">
                    <a>{{ steward.displayText }}</a>
                </span>
                <span *ngIf="!last">, </span>
            </ng-container>
        </div>
    </ng-container>
</ng-container>
