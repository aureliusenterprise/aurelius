<div class="card">
    <div class="card-content">
        <div class="media">
            <div class="media-content">
                <p class="title is-4" translate>search.browse.technicalContext.title</p>
            </div>
            <a class="icon has-text-info" (click)="activateInfoModal()">
                <fa-icon [icon]="faInfoCircle" size="lg"></fa-icon>
            </a>
        </div>
        <article class="media">
            <div class="media-left">
                <span class="icon has-text-primary">
                    <fa-icon [icon]="faSearch"></fa-icon>
                </span>
            </div>
            <div class="media-content">
                <div class="content">
                    <h6 class="title is-6" translate>search.browse.technicalContext.description</h6>

                    <p translate>search.browse.technicalContext.searchInstructions</p>
                </div>
                <nav class="level is-mobile">
                    <models4insight-simple-search-input
                        [context]="searchBarContext | async"
                        (querySubmitted)="onQuerySubmitted($event)"
                    ></models4insight-simple-search-input>
                </nav>
            </div>
        </article>
        <article class="media">
            <div class="media-left">
                <span class="icon has-text-primary">
                    <fa-icon [icon]="faCompass"></fa-icon>
                </span>
            </div>
            <div class="media-content">
                <div class="content">
                    <h6 class="title is-6" translate>search.browse.technicalContext.exploringTitle</h6>
                    <p translate>search.browse.technicalContext.exploringDescription</p>
                </div>
                <nav class="level is-mobile">
                    <a class="button is-success" (click)="directToTechnical()">
                        <span class="icon is-small">
                            <fa-icon [icon]="faServer"></fa-icon>
                        </span>
                        <span translate> search.browse.technicalContext.exploreButton </span>
                    </a>
                </nav>
            </div>
        </article>
    </div>
</div>

<models4insight-technical-context-info-modal></models4insight-technical-context-info-modal>
