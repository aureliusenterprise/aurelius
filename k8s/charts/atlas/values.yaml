---
replicaCount: 1
repository: ghcr.io/aureliusenterprise/aurelius-docker-apache-atlas
pullPolicy: Always
service:
    name: atlas
    type: ClusterIP
    externalPort: 21000
    internalPort: 21000
    internalPort_kafka: 9027
persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
env:
    KEYCLOAK_ATLAS_ADMIN_USERNAME: 'atlas'
external_hostname: 'aureliusdev.westeurope.cloudapp.azure.com'
