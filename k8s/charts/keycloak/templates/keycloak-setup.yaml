{{- if .Values.keycloakSetupJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "keycloak.fullname" . }}-setup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": keep
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: setup
    spec:
      restartPolicy: Never
      containers:
        - name: keycloak-setup
          image: "{{ .Values.repository }}:{{ .Values.global.version }}"
          imagePullPolicy: {{ .Values.pullPolicy }}
          command: ['/bin/bash', '/scripts/keycloak-setup.sh']
          env:
            - name: KEYCLOAK_SERVER_URL
              value: {{ .Values.keycloakFrontendURL }}/{{ .Release.Namespace }}/auth
            - name: KEYCLOAK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: admin-username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: admin-password
            - name: KEYCLOAK_REALM_NAME
              value: "m4i"
            # Admin user credentials
            - name: ATLAS_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret-user-admin
                  key: username
            - name: ATLAS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret-user-admin
                  key: password
            # Steward user credentials
            - name: ATLAS_STEWARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret-user-steward
                  key: username
            - name: ATLAS_STEWARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret-user-steward
                  key: password
            # Data Scientist user credentials
            - name: ATLAS_DATA_SCIENTIST_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret-user-data
                  key: username
            - name: ATLAS_DATA_SCIENTIST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret-user-data
                  key: password
          volumeMounts:
            - name: setup-script
              mountPath: /scripts
      volumes:
        - name: setup-script
          configMap:
            name: {{ include "keycloak.fullname" . }}-setup-script
            defaultMode: 0755
{{- end }}
