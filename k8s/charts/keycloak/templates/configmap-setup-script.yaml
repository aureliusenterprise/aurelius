{{- if .Values.keycloakSetupJob.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keycloak.fullname" . }}-setup-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
data:
  keycloak-setup.sh: |
    #!/bin/bash
    set -e

    echo "Setting up Keycloak users..."

    # Retry configuration for API calls
    MAX_RETRIES=5
    RETRY_DELAY=5

    # Function to execute a command with retry logic
    retry_cmd() {
      local attempt=1
      
      while [ $attempt -le $MAX_RETRIES ]; do
        echo "Attempt $attempt"
        if "$@"; then
          return 0
        fi
        
        echo "Command failed. Retrying in ${RETRY_DELAY}s..."
        sleep $RETRY_DELAY
        attempt=$((attempt + 1))
      done
      
      echo "Error: Command failed after $MAX_RETRIES attempts" >&2
      return 1
    }

    # Configure credentials for admin with retry
    retry_cmd /opt/keycloak/bin/kcadm.sh config credentials \
      --server "${KEYCLOAK_SERVER_URL}" \
      --realm master \
      --user "${KEYCLOAK_ADMIN_USERNAME}" \
      --password "${KEYCLOAK_ADMIN_PASSWORD}"

    # Function to create user with roles
    create_user_with_roles() {
      local username=$1
      local password=$2
      local roles=$3
      
      # Check if user already exists with retry
      local user_exists="false"
      local check_result=$(retry_cmd /opt/keycloak/bin/kcadm.sh get users -r "${KEYCLOAK_REALM_NAME}" \
        -q -a -f username="$username" 2>/dev/null) || true
      
      if echo "$check_result" | grep -q "$username"; then
        user_exists="true"
      fi

      if [ "$user_exists" = "false" ]; then
        echo "Creating user: $username"

        # Create the user with retry
        retry_cmd /opt/keycloak/bin/kcadm.sh create users \
          -r "${KEYCLOAK_REALM_NAME}" \
          -s "username=$username" \
          -s "enabled=true"

        echo "Setting password for user: $username"
        
        # Set password with retry
        retry_cmd /opt/keycloak/bin/kcadm.sh set-password \
          -r "${KEYCLOAK_REALM_NAME}" \
          --username "$username" \
          --new-password "$password"
      
        # Add roles
        if [ ! -z "$roles" ]; then
          for role in $roles; do
            echo "Adding role $role to user: $username"
            retry_cmd /opt/keycloak/bin/kcadm.sh add-roles \
              -r "${KEYCLOAK_REALM_NAME}" \
              --uusername "$username" \
              --rolename "$role" || echo "Role $role could not be added (may already be assigned)"
          done
        fi

        echo "User $username created successfully"
      fi
    }

    # Create admin user with ROLE_ADMIN and DATA_STEWARD roles
    create_user_with_roles "${ATLAS_ADMIN_USERNAME}" "${ATLAS_ADMIN_PASSWORD}" "ROLE_ADMIN DATA_STEWARD"

    # Create steward user with DATA_STEWARD role
    create_user_with_roles "${ATLAS_STEWARD_USERNAME}" "${ATLAS_STEWARD_PASSWORD}" "DATA_STEWARD"

    # Create data scientist user with appropriate role
    create_user_with_roles "${ATLAS_DATA_SCIENTIST_USERNAME}" "${ATLAS_DATA_SCIENTIST_PASSWORD}" "DATA_SCIENTIST"

    echo "Keycloak setup completed successfully!"
  {{- end }}
