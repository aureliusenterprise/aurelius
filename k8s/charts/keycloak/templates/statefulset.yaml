apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "keycloak.fullname" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "keycloak.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      hostname: keycloak
      subdomain: atlas
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.repository }}:{{ .Values.tag }}"
          imagePullPolicy: {{ .Values.pullPolicy }}
          command: ["/opt/keycloak/bin/kc.sh", "start"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Keycloak admin credentials using KEYCLOAK_ADMIN and KEYCLOAK_ADMIN_PASSWORD
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: admin-username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                    name: keycloak-secret
                    key: admin-password
            # Keycloak 22+ production configuration using KC_* prefix
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HOSTNAME
              value: {{ .Values.keycloakFrontendURL | trimSuffix "/" }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://{{ include "keycloak.fullname" . }}-postgresql:5432/{{ .Values.postgresql.globalVariables.POSTGRES_DB }}
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.fullname" . }}-postgresql-secret
                  key: postgres-username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.fullname" . }}-postgresql-secret
                  key: postgres-password
            # Production mode settings
            - name: KC_LOG_LEVEL
              value: INFO
            - name: KC_METRICS_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
            # Legacy KEYCLOAK_* variables for backward compatibility
            - name: KEYCLOAK_FRONTEND_URL
              value: {{ .Values.keycloakFrontendURL }}{{ .Release.Namespace }}/auth
            - name: PROXY_ADDRESS_FORWARDING
              value: "true"
            - name: KEYCLOAK_IMPORT
              value: /tmp/realm.json
          envFrom:
            - secretRef:
                name: keycloak-secret-user-admin
            - secretRef:
                name: keycloak-secret-user-steward
            - secretRef:
                name: keycloak-secret-user-data
          volumeMounts:
            - name: realm-single-file-volume
              mountPath: /tmp/realm.json
              subPath: realm.json
      volumes:
        - name: realm-single-file-volume
          configMap:
            name: realm-single-file
