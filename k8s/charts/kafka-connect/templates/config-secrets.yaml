{{- if or .Values.customEnv.CONFIG_ELASTIC_PASSWORD .Values.customEnv.CONFIG_ELASTIC_KEY_PASSWORD .Values.customEnv.CONFIG_ELASTIC_KEYSTORE_PASSWORD .Values.customEnv.CONFIG_ELASTIC_TRUSTSTORE_PASSWORD }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "kafka-connect.fullname" . }}-secrets
  labels:
    app: {{ template "kafka-connect.name" . }}
    chart: {{ template "kafka-connect.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
type: Opaque
data:
  {{- if .Values.customEnv.CONFIG_ELASTIC_PASSWORD }}
  config-elastic-password: {{ .Values.customEnv.CONFIG_ELASTIC_PASSWORD | b64enc }}
  {{- end }}
  {{- if .Values.customEnv.CONFIG_ELASTIC_KEY_PASSWORD }}
  config-elastic-key-password: {{ .Values.customEnv.CONFIG_ELASTIC_KEY_PASSWORD | b64enc }}
  {{- end }}
  {{- if .Values.customEnv.CONFIG_ELASTIC_KEYSTORE_PASSWORD }}
  config-keystore-password: {{ .Values.customEnv.CONFIG_ELASTIC_KEYSTORE_PASSWORD | b64enc }}
  {{- end }}
  {{- if .Values.customEnv.CONFIG_ELASTIC_TRUSTSTORE_PASSWORD }}
  config-truststore-password: {{ .Values.customEnv.CONFIG_ELASTIC_TRUSTSTORE_PASSWORD | b64enc }}
  {{- end }}
{{- end }}
