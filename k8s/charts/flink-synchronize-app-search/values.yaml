# Default values for flink-synchronize-app-search

image: ghcr.io/aureliusenterprise/m4i-synchronize-app-search
imagePullPolicy: Always

jobName: synchronize-app-search

flinkJobManagerPort: 8081
flinkJobManagerRpcPort: 6123

# Atlas configuration - using Kubernetes service URL
atlasServerUrl: 'http://atlas:21000/api/atlas'

# Elasticsearch configuration
elasticsearchAppSearchIndexName: .ent-search-engine-documents-atlas-dev
elasticsearchStateIndexName: publish-state
elasticsearchEndpoint: https://elastic-search-es-http:9200
elasticsearchUsername: elastic
elasticsearchCertificatePath: /opt/flink/certs/ca.crt

# Kafka configuration
kafkaAppSearchTopicName: .ent-search-engine-documents-atlas-dev
kafkaPublishStateTopicName: publish-state
kafkaBootstrapServerHostname: kafka
kafkaBootstrapServerPort: 9092
kafkaConsumerGroupId: SYNCHRONIZE_APP_SEARCH_CONSUMER
kafkaErrorTopicName: DEAD_LETTER_BOX
kafkaProducerGroupId: SYNCHRONIZE_APP_SEARCH_PRODUCER
kafkaSourceTopicName: ATLAS_ENTITIES

# Keycloak configuration - using keycloak-secret-user-admin for credentials
keycloakClientId: m4i_atlas
keycloakClientSecretKey: '' # Optional
keycloakRealmName: m4i
keycloakServerUrl: 'https://{{ .Values.global.external_hostname }}/{{ .Release.Namespace }}/auth'

# Checkpointing
enableCheckpoints: true
checkpointInterval: 300000
checkpointTimeout: 60000
maxConcurrentCheckpoints: 1
